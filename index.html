<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRORBLADE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: #0a0000;
      color: #ff3366;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at center, rgba(180, 20, 20, 0.25) 0%, transparent 60%);
      pointer-events: none;
    }

    h1 {
      font-family: 'Creepster', cursive;
      font-size: 7rem;
      margin: 60px 0 20px 0;
      background: linear-gradient(145deg, #ff3366, #ff8899, #ff3366);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 0 20px #ff3366,
        0 0 40px #ff1133,
        0 0 80px #8B0000,
        0 0 120px #000;
      letter-spacing: 12px;
      animation: glassglow 3s infinite alternate;
    }

    .subtitle {
      font-size: 1.8rem;
      color: #ff4455;
      margin-bottom: 60px;
      text-shadow: 0 0 25px #ff0000;
      letter-spacing: 4px;
    }

    .hero {
      width: 460px;
      height: 460px;
      margin: 0 auto;
      transition: all 0.6s ease;
      filter: drop-shadow(0 0 60px #ff1133) brightness(1.1);
      cursor: grab;
    }

    .hero:hover {
      transform: rotateY(30deg) rotateX(12deg) scale(1.1);
    }

    @keyframes glassglow {
      from { filter: brightness(1) hue-rotate(0deg); }
      to { filter: brightness(1.3) hue-rotate(15deg); }
    }
  </style>
</head>
<body>
  <h1>TERRORBLADE</h1>
  <p class="subtitle">MIRROR REALM</p>
  
  <img src="https://i.ibb.co/KXXY7vJ/terrorblade-red-arcana.png" 
       class="hero" 
       alt="Terrorblade Red Arcana">
</body>
</html>
