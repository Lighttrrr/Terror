<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRORBLADE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=UnifrakturMaguntia&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: #050000 url('https://i.ibb.co/0jZ7vKq/terrorblade-red-arcana.png') center/cover no-repeat fixed;
      background-color: #0a0000;
      color: #ff3366;
      font-family: 'Creepster', cursive;
      text-align: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Тёмная вуаль поверх фона */
    body::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(10,0,0,0.75), rgba(20,0,0,0.9));
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      padding-top: 80px;
    }

    h1 {
      font-size: 8.5rem;
      margin: 0 0 20px 0;
      background: linear-gradient(135deg, #ff4455, #ff99aa, #ff3344);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 0 40px #ff1133,
        0 0 80px #ff0000,
        0 0 120px #8B0000,
        inset 0 0 60px rgba(255, 255, 255, 0.35);
      letter-spacing: 18px;
      animation: liquidglass 5s infinite alternate ease-in-out;
      filter: drop-shadow(0 0 50px #ff1133);
    }

    .subtitle {
      font-size: 2.4rem;
      color: #ff6677;
      margin-bottom: 100px;
      text-shadow: 0 0 40px #ff0000;
      letter-spacing: 8px;
      font-family: 'UnifrakturMaguntia', cursive;
    }

    p {
      font-size: 1.3rem;
      max-width: 700px;
      margin: 0 auto 50px;
      color: #ff99aa;
      text-shadow: 0 0 15px #000;
    }

    @keyframes liquidglass {
      from { 
        filter: drop-shadow(0 0 40px #ff3366) brightness(1.1); 
      }
      to { 
        filter: drop-shadow(0 0 90px #ff6688) brightness(1.5); 
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>TERRORBLADE</h1>
    <p class="subtitle">SOUL DEVOURER • MIRROR REALM</p>
    <p>Я — отражение твоего страха.<br>
       Я — конец всех иллюзий.</p>
  </div>
</body>
</html>
