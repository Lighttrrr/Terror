<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRORBLADE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: #0a0000;
      color: #ff3366;
      font-family: 'Creepster', cursive;
      text-align: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at center, rgba(255, 40, 40, 0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    h1 {
      font-size: 7.2rem;
      margin: 70px 0 25px 0;
      background: linear-gradient(135deg, #ff5555, #ff99aa, #ff3344, #ff5555);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 0 30px #ff3366,
        0 0 60px #ff1133,
        0 0 90px #8B0000,
        inset 0 0 40px rgba(255,255,255,0.4);
      letter-spacing: 15px;
      animation: liquidglass 4s infinite alternate ease-in-out;
      filter: drop-shadow(0 0 40px #ff1133);
    }

    .subtitle {
      font-size: 2rem;
      color: #ff6677;
      margin-bottom: 70px;
      text-shadow: 0 0 30px #ff0000;
      letter-spacing: 6px;
    }

    .hero {
      width: 480px;
      height: 480px;
      margin: 0 auto;
      transition: all 0.7s ease;
      filter: drop-shadow(0 0 70px #ff1133) brightness(1.15);
      cursor: grab;
    }

    .hero:hover {
      transform: rotateY(32deg) rotateX(15deg) scale(1.12);
    }

    @keyframes liquidglass {
      from { 
        filter: drop-shadow(0 0 30px #ff3366) brightness(1); 
      }
      to { 
        filter: drop-shadow(0 0 70px #ff6688) brightness(1.4); 
      }
    }
  </style>
</head>
<body>
  <h1>TERRORBLADE</h1>
  <p class="subtitle">MIRROR REALM</p>
  
  <img src="https://i.ibb.co/0jZ7vKq/terrorblade-red-arcana.png" 
       class="hero" 
       alt="Terrorblade Red Arcana">
</body>
</html>
